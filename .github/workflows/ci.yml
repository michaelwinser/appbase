name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./db/... ./auth/... ./config/... ./server/... -v

      - name: Consumer contract tests (Hyrum's)
        run: go test ./hyrums/... -v 2>/dev/null || echo "No consumer tests yet"

      - name: Example app use case tests
        run: go test ./examples/... -v

      - name: All tests (summary)
        run: go test ./... -count=1
