name: todo-api
port: 3000

store:
  type: sqlite
  path: data/app.db

gcp:
  apis:
    - tasks.googleapis.com

environments:
  local:
    url: http://localhost:3000
    auth:
      client_id: ${secret:google-client-id}
      client_secret: ${secret:google-client-secret}
      extra_scopes:
        - https://www.googleapis.com/auth/tasks

  production:
    url: https://todo-api.run.app
    store:
      type: firestore
      gcp_project: xwind-appbase
    auth:
      client_id: ${secret:google-client-id}
      client_secret: ${secret:google-client-secret}
      extra_scopes:
        - https://www.googleapis.com/auth/tasks

targets:
  production:
    type: cloudrun
    project: xwind-appbase
    region: us-central1
    support_email: michaelw@xwind.io
    store:
      type: firestore
    auth:
      client_id: ${secret:google-client-id}
      client_secret: ${secret:google-client-secret}
